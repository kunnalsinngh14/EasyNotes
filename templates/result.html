<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Notes</title>
    <!-- Professional typography: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Modern Attractive UI Variables */
        :root {
            --bg-color: #f8fafc; /* slate-50 */
            --surface-color: #ffffff;
            --border-color: #e2e8f0; /* slate-200 */
            --primary: #0ea5e9; /* sky-500 */
            --primary-hover: #0284c7; /* sky-600 */
            --text-main: #0f172a; /* slate-900 */
            --text-muted: #64748b; /* slate-500 */
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
            --transition: 200ms ease-in-out;
            --radius: 16px;
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 24px;
            -webkit-font-smoothing: antialiased;
            background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background-color: var(--surface-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            padding: 48px;
            border: 1px solid var(--border-color);
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 2px solid var(--border-color);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            background-color: var(--primary);
            color: white;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.03em;
        }

        .btn-outline {
            display: inline-block;
            background-color: var(--surface-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow-sm);
        }

        .btn-outline:hover {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }

        /* Markdown Content Styling */
        .content-box {
            background-color: var(--surface-color);
            color: #334155; /* slate-700 */
            font-size: 16px;
            line-height: 1.7;
        }

        /* Remove pre-wrap because markdown converts to HTML tags now */
        .content-box h1, .content-box h2, .content-box h3 {
            color: var(--text-main);
            margin-top: 32px;
            margin-bottom: 16px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        
        .content-box h1 { font-size: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .content-box h2 { font-size: 20px; }
        .content-box h3 { font-size: 18px; }

        .content-box p {
            margin-bottom: 16px;
        }

        .content-box ul, .content-box ol {
            margin-bottom: 16px;
            padding-left: 24px;
        }

        .content-box li {
            margin-bottom: 8px;
        }

        .content-box strong {
            color: var(--text-main);
            font-weight: 600;
        }

        .content-box blockquote {
            border-left: 4px solid var(--primary);
            background-color: #f0f9ff; /* sky-50 */
            padding: 16px;
            margin: 24px 0;
            border-radius: 0 8px 8px 0;
            color: #0369a1; /* sky-700 */
            font-style: italic;
        }

        .empty-state {
            text-align: center;
            padding: 64px 0;
            color: var(--text-muted);
            font-size: 16px;
            background-color: #f8fafc;
            border-radius: 12px;
            border: 2px dashed var(--border-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <div class="brand">
                <div class="brand-icon">✨</div>
                <h1>EASY NOTES</h1>
            </div>
            <a href="/" class="btn-outline">← Upload Another File</a>
        </div>

        {% if summary %}
            <div class="content-box">
                {{ summary | safe }}
            </div>
        {% else %}
            <div class="empty-state">
                No summary available. Please upload a document first!
            </div>
        {% endif %}
    </div>

</body>
</html>
